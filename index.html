<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HackClutch — Valorant Esports</title>
<link rel="icon" type="image/svg+xml" href="https://simpleicons.org/icons/valorant.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="logo" onclick="navigate('/')">
      <div class="logo-icon"><img src="https://simpleicons.org/icons/valorant.svg" alt="" width="28" height="28" style="filter:brightness(0)"></div>
      <span>HackClutch</span>
    </div>
    <nav class="nav" id="nav">
      <a href="#/" data-route="/">News</a>
      <a href="#/matches" data-route="/matches">Matches</a>
      <a href="#/rankings" data-route="/rankings">Rankings</a>
      <a href="#/stats" data-route="/stats">Stats</a>
      <a href="#/players" data-route="/players">Players</a>
      <a href="#/teams" data-route="/teams">Teams</a>
      <a href="#/events" data-route="/events">Events</a>
    </nav>
    <div class="search-box">
      <div class="search-bar">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--muted-soft);flex-shrink:0"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <input type="text" id="searchInput" placeholder="Search teams, players..." />
        <button class="search-orb" onclick="doSearch()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
      </div>
    </div>
  </div>
</header>

<main class="main" id="app"></main>

<div class="modal-overlay" id="modal">
  <div class="modal" id="modalContent">
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <div id="modalBody"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
